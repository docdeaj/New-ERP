  <style>
    /* Aurora Tactile Theme Tokens */
    :root {
      --noise-light: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      --noise-dark: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      
      --color-primary-50: 239 246 255; --color-primary-100: 219 234 254; --color-primary-200: 191 219 254; --color-primary-300: 147 197 253; --color-primary-400: 96 165 250; --color-primary-500: 59 130 246; --color-primary-600: 37 99 235; --color-primary-700: 29 78 216; --color-primary-800: 30 64 175; --color-primary-900: 30 58 138; --color-primary-950: 23 37 84;
      --color-slate-50: 248 250 252; --color-slate-100: 241 245 249; --color-slate-200: 226 232 240; --color-slate-300: 203 213 225; --color-slate-400: 148 163 184; --color-slate-500: 100 116 139; --color-slate-600: 71 85 105; --color-slate-700: 51 65 85; --color-slate-800: 30 41 59; --color-slate-900: 15 23 42; --color-slate-950: 2 6 23;
      --color-charcoal-50: 249 250 251; --color-charcoal-100: 243 244 246; --color-charcoal-200: 229 231 235; --color-charcoal-300: 209 213 219; --color-charcoal-400: 156 163 175; --color-charcoal-500: 107 114 128; --color-charcoal-600: 75 85 99; --color-charcoal-700: 55 65 81; --color-charcoal-800: 31 41 55; --color-charcoal-900: 17 24 39; --color-charcoal-950: 3 7 18;

      --bg: rgb(var(--color-slate-100));
      --text: rgb(var(--color-slate-800));
      --surface: rgb(var(--color-slate-50));
      --surface-inset: rgb(var(--color-slate-200));
      --surface-raised: white;
      --border: rgb(var(--color-slate-200));
      --border-accent: rgb(var(--color-slate-300));
      --shadow-color: 210 20% 40%;
      --shadow-sm: 0 1px 2px 0px hsl(var(--shadow-color) / 0.1), 0 1px 1px 0px hsl(var(--shadow-color) / 0.06);
      --shadow-md: 0 4px 6px -1px hsl(var(--shadow-color) / 0.1), 0 2px 4px -2px hsl(var(--shadow-color) / 0.1);
      --shadow-lg: 0 10px 15px -3px hsl(var(--shadow-color) / 0.1), 0 4px 6px -4px hsl(var(--shadow-color) / 0.1);
      --inner-shadow: inset 0 2px 4px 0px hsl(var(--shadow-color) / 0.05);
      --shine-outer: inset 0 1px 0 0 white;
      --shine-inner: inset 0 1px 0 0 hsl(var(--shadow-color) / 0.05);
      --primary: rgb(var(--color-primary-600));
    }
    html.dark {
      --bg: rgb(var(--color-charcoal-950));
      --text: rgb(var(--color-charcoal-200));
      --surface: rgb(var(--color-charcoal-900));
      --surface-inset: rgb(var(--color-charcoal-950));
      --surface-raised: rgb(var(--color-charcoal-800));
      --border: rgb(var(--color-charcoal-800));
      --border-accent: rgb(var(--color-charcoal-700));
      --shadow-color: 220 20% 5%;
      --shine-outer: inset 0 1px 0 0 hsl(0 0% 100% / 0.05);
      --shine-inner: inset 0 1px 0 0 hsl(0 0% 0% / .2);
      --primary: rgb(var(--color-primary-500));
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background-image: var(--noise-light);
      opacity: 0.1;
      pointer-events: none;
      z-index: -1;
    }
    html.dark body::before { background-image: var(--noise-dark); opacity: 0.05; }
    
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 4px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background-color: var(--primary); }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { 50: 'rgb(var(--color-primary-50) / <alpha-value>)', 100: 'rgb(var(--color-primary-100) / <alpha-value>)', 200: 'rgb(var(--color-primary-200) / <alpha-value>)', 300: 'rgb(var(--color-primary-300) / <alpha-value>)', 400: 'rgb(var(--color-primary-400) / <alpha-value>)', 500: 'rgb(var(--color-primary-500) / <alpha-value>)', 600: 'rgb(var(--color-primary-600) / <alpha-value>)', 700: 'rgb(var(--color-primary-700) / <alpha-value>)', 800: 'rgb(var(--color-primary-800) / <alpha-value>)', 900: 'rgb(var(--color-primary-900) / <alpha-value>)', 950: 'rgb(var(--color-primary-950) / <alpha-value>)' },
            slate: { 50: 'rgb(var(--color-slate-50) / <alpha-value>)', 100: 'rgb(var(--color-slate-100) / <alpha-value>)', 200: 'rgb(var(--color-slate-200) / <alpha-value>)', 300: 'rgb(var(--color-slate-300) / <alpha-value>)', 400: 'rgb(var(--color-slate-400) / <alpha-value>)', 500: 'rgb(var(--color-slate-500) / <alpha-value>)', 600: 'rgb(var(--color-slate-600) / <alpha-value>)', 700: 'rgb(var(--color-slate-700) / <alpha-value>)', 800: 'rgb(var(--color-slate-800) / <alpha-value>)', 900: 'rgb(var(--color-slate-900) / <alpha-value>)', 950: 'rgb(var(--color-slate-950) / <alpha-value>)' },
            charcoal: { 50: 'rgb(var(--color-charcoal-50) / <alpha-value>)', 100: 'rgb(var(--color-charcoal-100) / <alpha-value>)', 200: 'rgb(var(--color-charcoal-200) / <alpha-value>)', 300: 'rgb(var(--color-charcoal-300) / <alpha-value>)', 400: 'rgb(var(--color-charcoal-400) / <alpha-value>)', 500: 'rgb(var(--color-charcoal-500) / <alpha-value>)', 600: 'rgb(var(--color-charcoal-600) / <alpha-value>)', 700: 'rgb(var(--color-charcoal-700) / <alpha-value>)', 800: 'rgb(var(--color-charcoal-800) / <alpha-value>)', 900: 'rgb(var(--color-charcoal-900) / <alpha-value>)', 950: 'rgb(var(--color-charcoal-950) / <alpha-value>)' },
            surface: 'var(--surface)',
            'surface-inset': 'var(--surface-inset)',
            'surface-raised': 'var(--surface-raised)',
            'brand-text': 'var(--text)',
            'brand-border': 'var(--border)',
            'brand-border-accent': 'var(--border-accent)',
          },
          boxShadow: {
            sm: 'var(--shadow-sm)',
            md: 'var(--shadow-md)',
            lg: 'var(--shadow-lg)',
            'inner-sm': 'var(--inner-shadow)',
            'shine-outer': 'var(--shine-outer)',
            'shine-inner': 'var(--shine-inner)',
          }
        }
      }
    }
  </script>
