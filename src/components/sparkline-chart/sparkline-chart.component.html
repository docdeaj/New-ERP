<div class="w-full h-full">
    @if(data().length > 1) {
        <svg [attr.viewBox]="viewBox" 
             class="overflow-visible"
             [class]="color()"
             style="filter: drop-shadow(0 1px 3px currentColor);">
            <path 
                [attr.d]="path()"
                fill="none"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="stroke-current">
            </path>
        </svg>
    }
</div>
