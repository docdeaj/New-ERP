<div class="w-full h-full">
    @if(data().length > 1 && lastPoint(); as lastPt) {
        <svg [attr.viewBox]="viewBox" 
             class="overflow-visible"
             [class]="color()">
            <defs>
              <linearGradient id="sparkline-taper-grad" x1="0" x2="1" y1="0" y2="0">
                <stop offset="0%" stop-opacity="0" />
                <stop offset="20%" stop-opacity="1" />
                <stop offset="80%" stop-opacity="1" />
                <stop offset="100%" stop-opacity="0" />
              </linearGradient>
              <mask id="sparkline-taper-mask">
                <rect x="0" y="0" width="100" height="25" fill="url(#sparkline-taper-grad)" />
              </mask>
            </defs>

            <!-- Faint zero-line baseline, slightly above the bottom -->
            <line x1="0" y1="22.5" x2="100" y2="22.5" stroke="currentColor" stroke-width="0.25" opacity="0.3" />

            <!-- Main sparkline path -->
            <path 
                [attr.d]="path()"
                fill="none"
                stroke-width="1.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="stroke-current"
                mask="url(#sparkline-taper-mask)"
                style="filter: drop-shadow(0 1px 2px var(--shadow-color) / 0.5);">
            </path>
            
            <!-- End point marker -->
            <circle [attr.cx]="lastPt.x" [attr.cy]="lastPt.y" r="1.5" fill="currentColor" />
        </svg>
    }
</div>
