<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-gray-900/50 backdrop-blur-sm animate-[fade-in_180ms_ease-in-out]" (click)="onClose()"></div>

  <!-- Modal -->
  <form [formGroup]="transferForm" (ngSubmit)="onTransfer()" class="relative w-full max-w-lg bg-white dark:bg-gray-800 rounded-2xl shadow-2xl animate-[slide-down_180ms_cubic-bezier(0.2,0.8,0.2,1)]" role="dialog" aria-modal="true">
    <!-- Header -->
    <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
      <h3 class="text-xl font-bold">Transfer Stock</h3>
      <button type="button" (click)="onClose()" class="text-gray-400 hover:text-gray-800 dark:hover:text-white transition-colors p-2 rounded-full">
        <i class="fa-solid fa-times text-xl"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4">
      <p class="text-sm text-gray-600 dark:text-gray-300">
        You are about to transfer <span class="font-bold">{{ selectedItemIds().length }}</span> selected item(s).
      </p>
      <div class="flex items-center gap-4">
        <!-- From Location -->
        <div class="flex-1">
          <label for="fromLocation" class="block text-sm font-medium text-gray-700 dark:text-gray-300">From</label>
          <select id="fromLocation" formControlName="from" class="mt-1 block w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            @for(loc of locations; track loc.key) {
              <option [value]="loc.key">{{ loc.name }}</option>
            }
          </select>
        </div>

        <i class="fa-solid fa-arrow-right-long text-gray-400 mt-6"></i>

        <!-- To Location -->
        <div class="flex-1">
          <label for="toLocation" class="block text-sm font-medium text-gray-700 dark:text-gray-300">To</label>
          <select id="toLocation" formControlName="to" class="mt-1 block w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
            @for(loc of locations; track loc.key) {
              <option [value]="loc.key">{{ loc.name }}</option>
            }
          </select>
        </div>
      </div>
       <div>
        <label for="quantity" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Quantity</label>
        <input type="text" id="quantity" formControlName="quantity" placeholder="Enter quantity or 'All'"
               class="mt-1 block w-full bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
      @if (transferForm.hasError('sameLocation')) {
        <p class="text-sm text-red-500">Source and destination locations cannot be the same.</p>
      }
    </div>

    <!-- Footer -->
    <div class="p-4 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
        <button (click)="onClose()" type="button" class="bg-white dark:bg-gray-700 py-2 px-4 border border-gray-300 dark:border-gray-600 rounded-md shadow-sm text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Cancel
        </button>
        <button type="submit" [disabled]="transferForm.invalid" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:bg-indigo-400 disabled:cursor-not-allowed">
            Confirm Transfer
        </button>
    </div>
  </form>
</div>
