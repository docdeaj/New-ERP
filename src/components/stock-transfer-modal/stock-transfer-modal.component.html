<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="aurora-backdrop absolute inset-0 animate-[fade-in_180ms_ease-in-out]" (click)="onClose()"></div>

  <!-- Modal -->
  <form [formGroup]="transferForm" (ngSubmit)="onTransfer()" class="relative w-full max-w-lg bg-surface/90 backdrop-blur-xl rounded-2xl shadow-2xl animate-[slide-down_180ms_cubic-bezier(0.2,0.8,0.2,1)]" role="dialog" aria-modal="true">
    <!-- Header -->
    <div class="p-4 flex justify-between items-center">
      <h3 class="text-xl font-bold">Transfer Stock</h3>
      <button type="button" (click)="onClose()" class="text-charcoal-400 hover:text-charcoal-100 transition-colors p-2 rounded-full">
        <i class="fa-solid fa-times text-xl"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 space-y-4">
      <p class="text-sm text-charcoal-300">
        You are about to transfer <span class="font-bold">{{ selectedItemIds().length }}</span> selected item(s).
      </p>
      <div class="flex items-center gap-4">
        <!-- From Location -->
        <div class="flex-1">
          <label for="fromLocation" class="block text-sm font-medium text-charcoal-300">From</label>
          <select id="fromLocation" formControlName="from" class="aurora-input mt-1 block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm transition-all duration-150 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-inset focus:outline-none">
            @for(loc of locations; track loc.key) {
              <option [value]="loc.key">{{ loc.name }}</option>
            }
          </select>
        </div>

        <i class="fa-solid fa-arrow-right-long text-charcoal-400 mt-6"></i>

        <!-- To Location -->
        <div class="flex-1">
          <label for="toLocation" class="block text-sm font-medium text-charcoal-300">To</label>
          <select id="toLocation" formControlName="to" class="aurora-input mt-1 block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm transition-all duration-150 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-inset focus:outline-none">
            @for(loc of locations; track loc.key) {
              <option [value]="loc.key">{{ loc.name }}</option>
            }
          </select>
        </div>
      </div>
       <div>
        <label for="quantity" class="block text-sm font-medium text-charcoal-300">Quantity</label>
        <input type="text" id="quantity" formControlName="quantity" placeholder="Enter quantity or 'All'"
               class="aurora-input mt-1 block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm transition-all duration-150 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-inset focus:outline-none">
      </div>
      @if (transferForm.hasError('sameLocation')) {
        <p class="text-sm text-red-500">Source and destination locations cannot be the same.</p>
      }
    </div>

    <!-- Footer -->
    <div class="p-4 flex justify-end gap-3">
        <button (click)="onClose()" type="button" class="aurora-button-secondary inline-flex items-center justify-center gap-2 font-semibold text-charcoal-200 px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
            Cancel
        </button>
        <button type="submit" [disabled]="transferForm.invalid" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
            Confirm Transfer
        </button>
    </div>
  </form>
</div>
