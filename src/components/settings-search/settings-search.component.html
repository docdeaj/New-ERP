
<div #container class="relative">
  <div class="relative">
    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-charcoal-400"></i>
    <input 
      type="text" 
      placeholder="Search settings... (e.g., section:POS barcode)" 
      class="aurora-input w-full bg-surface-inset text-lg text-charcoal-100 placeholder-charcoal-400 dark:placeholder-charcoal-500 focus:outline-none rounded-xl py-3 pl-12 pr-4 shadow-lg"
      [value]="query()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (keydown)="onKeyDown($event)">
  </div>
  
  @if (isFocused() && results().length > 0) {
    <div class="absolute top-full mt-2 w-full max-h-96 overflow-y-auto bg-surface/95 backdrop-blur-xl rounded-xl shadow-2xl z-20 border border-charcoal-700/30">
      @for (group of results(); track group.section) {
        <div>
          <h3 class="sticky top-0 bg-surface-raised/80 backdrop-blur-sm px-4 py-1.5 text-xs font-semibold text-charcoal-400 uppercase tracking-wider">{{ group.section }}</h3>
          <ul>
            @for (item of group.items; track item.key) {
              <li (click)="selectItem(item)"
                  (mouseenter)="activeIndex.set(flattenedResults().indexOf(item))"
                  [class]="'flex items-start gap-4 p-3 cursor-pointer ' + (activeResult()?.key === item.key ? 'bg-primary/10' : 'hover:bg-surface-raised')">
                <div class="flex-1 overflow-hidden">
                  <p class="font-semibold text-charcoal-100" [innerHTML]="item.label | highlight : query()"></p>
                  <p class="text-sm text-charcoal-400 truncate" [innerHTML]="item.description | highlight : query()"></p>
                </div>
              </li>
            }
          </ul>
        </div>
      }
    </div>
  }
</div>
