<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="aurora-backdrop absolute inset-0 animate-[fade-in_180ms_ease-in-out]" (click)="onCancel()"></div>

  <!-- Modal -->
  <div cdkTrapFocus class="relative w-full max-w-md bg-surface/90 backdrop-blur-xl rounded-2xl shadow-2xl animate-[slide-down_180ms_cubic-bezier(0.2,0.8,0.2,1)]" role="dialog" aria-modal="true">
    <!-- Body -->
    <div class="p-6 text-center">
      <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-red-900/50">
        <i class="fa-solid fa-triangle-exclamation text-2xl text-red-400"></i>
      </div>
      <h3 class="mt-5 text-lg font-semibold leading-6 text-charcoal-100" id="modal-title">{{ title() }}</h3>
      <div class="mt-2">
        <p class="text-sm text-charcoal-400">{{ message() }}</p>
      </div>
    </div>
    
    <!-- Footer -->
    <div class="flex items-center justify-center p-4 gap-3">
      <button (click)="onCancel()" type="button" class="aurora-button-secondary inline-flex items-center justify-center gap-2 font-semibold text-charcoal-200 px-4 py-2 rounded-xl transition-all duration-150 ease-in-out w-full sm:w-auto">
        Cancel
      </button>
      <button (click)="onConfirm()" type="button" class="aurora-button-danger inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out w-full sm:w-auto">
        <i class="fa-solid fa-trash-can"></i>
        <span>Delete</span>
      </button>
    </div>
  </div>
</div>
