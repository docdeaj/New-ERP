<div class="flex flex-col items-center justify-center gap-6 h-full">
  <div class="relative w-40 h-40">
    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
      @for(segment of segments(); track segment.label) {
        <circle
          class="stroke-current transition-all duration-500 ease-in-out"
          [style.color]="segment.color"
          stroke-width="7"
          fill="none"
          cx="18"
          cy="18"
          r="14.5"
          [attr.stroke-dasharray]="segment.percentage + ' ' + (100 - segment.percentage)"
          [attr.stroke-dashoffset]="-segment.offset"
        >
          <title>{{ segment.label }}: {{ segment.value | currency:'LKR ' }}</title>
        </circle>
      }
    </svg>
    <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
      <span class="text-xs text-gray-500 dark:text-gray-400">Total</span>
      <span class="font-bold text-xl tabular-nums">{{ total() | currency:'LKR ':'symbol':'1.0-0' }}</span>
    </div>
  </div>
  <div class="flex flex-wrap justify-center gap-x-4 gap-y-1 text-sm">
    @for(segment of segments(); track segment.label) {
      <div class="flex items-center gap-1.5">
        <div class="w-2.5 h-2.5 rounded-sm" [style.backgroundColor]="segment.color"></div>
        <span class="font-semibold text-gray-700 dark:text-gray-200">{{ segment.label }}</span>
        <span class="text-gray-500 dark:text-gray-400">({{ segment.percentage | number:'1.0-0' }}%)</span>
      </div>
    }
  </div>
</div>
