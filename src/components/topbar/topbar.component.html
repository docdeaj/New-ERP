<header class="flex items-center justify-between h-16">
  <div class="flex items-center gap-4">
    <!-- Page title removed as per spec -->
  </div>
  
  <div class="flex items-center gap-2 sm:gap-4 relative top-2">
    <button (click)="onLogout()" class="aurora-button-secondary !w-11 !h-11 !p-0 !rounded-full flex items-center justify-center" aria-label="Logout">
      <i class="fa-solid fa-right-from-bracket text-charcoal-300"></i>
    </button>
    <button (click)="toggleNotifications()"
            class="aurora-button-secondary !w-11 !h-11 !p-0 !rounded-full relative flex items-center justify-center"
            aria-label="Open notifications">
        <i class="fa-solid fa-bell text-charcoal-300"></i>
        @if(unreadCount() > 0) {
          <span class="absolute -top-1 -right-1 flex h-5 w-5">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex items-center justify-center rounded-full h-5 w-5 bg-red-500 text-white text-xs font-bold">{{ unreadCount() }}</span>
          </span>
        }
    </button>
    <button (click)="onSettings()" class="aurora-button-secondary !w-11 !h-11 !p-0 !rounded-full flex items-center justify-center" aria-label="Settings">
      <i class="fa-solid fa-cog text-charcoal-300"></i>
    </button>
    <button (click)="onOpenSearch()" 
            class="aurora-button-secondary !w-11 !h-11 !p-0 !rounded-full flex items-center justify-center"
            aria-label="Open search">
      <i class="fa-solid fa-magnifying-glass text-charcoal-300"></i>
    </button>
    <button (click)="onHelp()" class="aurora-button-secondary !w-11 !h-11 !p-0 !rounded-full flex items-center justify-center" aria-label="Help & Keyboard Shortcuts (?)">
      <i class="fa-solid fa-circle-question text-charcoal-300"></i>
    </button>
  </div>
</header>
