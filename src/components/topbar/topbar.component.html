<header class="flex items-center justify-between h-16">
  <div class="flex items-center gap-4">
    <span class="font-cinzel text-2xl font-bold text-brand-text">M Leather</span>
    <div class="h-6 w-px bg-brand-border-accent/20"></div>
    <h1 class="text-2xl sm:text-3xl font-bold text-brand-text">{{ pageTitle() }}</h1>
  </div>
  
  <div class="flex items-center gap-2 sm:gap-4">
    <button (click)="onOpenSearch()" 
            class="group flex items-center justify-center w-11 h-11 bg-surface-raised rounded-full shadow-md hover:shadow-lg hover:bg-primary-500/10 hover:-translate-y-px active:scale-98 active:shadow-inner transition-all duration-200 ease-in-out focus:outline-none focus-visible:shadow-[var(--focus-ring)]"
            aria-label="Open search">
      <i class="fa-solid fa-magnifying-glass text-charcoal-300 transition-transform duration-200 group-hover:scale-110"></i>
    </button>
    <button class="group flex items-center justify-center w-11 h-11 bg-surface-raised rounded-full shadow-md hover:shadow-lg hover:bg-primary-500/10 hover:-translate-y-px active:scale-98 active:shadow-inner transition-all duration-200 ease-in-out focus:outline-none focus-visible:shadow-[var(--focus-ring)]" aria-label="Settings">
      <i class="fa-solid fa-cog text-charcoal-300 transition-transform duration-200 group-hover:scale-110"></i>
    </button>
    <button class="group flex items-center justify-center w-11 h-11 bg-surface-raised rounded-full shadow-md hover:shadow-lg hover:bg-primary-500/10 hover:-translate-y-px active:scale-98 active:shadow-inner transition-all duration-200 ease-in-out focus:outline-none focus-visible:shadow-[var(--focus-ring)]" aria-label="Logout">
      <i class="fa-solid fa-right-from-bracket text-charcoal-300 transition-transform duration-200 group-hover:scale-110"></i>
    </button>
  </div>
</header>
