<header class="flex items-center justify-between h-16">
  <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 dark:text-white">{{ pageTitle() }}</h1>
  
  <div class="flex items-center gap-2 sm:gap-4">
    <button (click)="onOpenSearch()" 
            class="flex items-center justify-center w-10 h-10 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border border-gray-200/50 dark:border-gray-700/50 rounded-full shadow-sm hover:bg-gray-200/50 dark:hover:bg-gray-700/50 transition-all duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-gray-100 dark:focus:ring-offset-gray-900"
            aria-label="Open search">
      <i class="fa-solid fa-magnifying-glass text-gray-600 dark:text-gray-300"></i>
    </button>
    <button class="flex items-center justify-center w-10 h-10 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border border-gray-200/50 dark:border-gray-700/50 rounded-full shadow-sm hover:bg-gray-200/50 dark:hover:bg-gray-700/50 transition-all duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-gray-100 dark:focus:ring-offset-gray-900" aria-label="Settings">
      <i class="fa-solid fa-cog text-gray-600 dark:text-gray-300"></i>
    </button>
    <button class="flex items-center justify-center w-10 h-10 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border border-gray-200/50 dark:border-gray-700/50 rounded-full shadow-sm hover:bg-gray-200/50 dark:hover:bg-gray-700/50 transition-all duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 focus:ring-offset-gray-100 dark:focus:ring-offset-gray-900" aria-label="Logout">
      <i class="fa-solid fa-right-from-bracket text-gray-600 dark:text-gray-300"></i>
    </button>
  </div>
</header>
