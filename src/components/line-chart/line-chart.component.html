<div class="h-full w-full p-6 flex flex-col">
    @if (labels().length > 0 && datasets().length > 0) {
        <div class="flex-1">
            <svg [attr.viewBox]="viewBox" class="w-full h-full">
                <!-- Y-Axis Labels & Guidelines -->
                @for (label of yAxisLabels(); track label; let i = $index) {
                    @let yPos = 20 + i * (200 / 4);
                    <text [attr.x]="40" [attr.y]="yPos" text-anchor="end" alignment-baseline="middle" font-size="10" class="fill-current text-charcoal-500">
                        {{ label | currency:'LKR ':'symbol-narrow':'1.0-0' }}
                    </text>
                    <line [attr.x1]="50" [attr.y1]="yPos" x2="480" [attr.y2]="yPos" class="stroke-current text-charcoal-800/50" stroke-width="0.5" stroke-dasharray="2 2"></line>
                }

                <!-- X-Axis Labels -->
                @for(label of labels(); track label; let i = $index) {
                     @let xPos = 50 + (i / (labels().length - 1)) * 430;
                    <text [attr.x]="xPos" y="235" text-anchor="middle" font-size="10" class="fill-current text-charcoal-400">
                        {{ label }}
                    </text>
                }

                <!-- Data Paths -->
                @for(pathInfo of datasetPaths(); track pathInfo.color) {
                    <path [attr.d]="pathInfo.path" [attr.stroke]="pathInfo.color" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
                }

                <!-- Data Points -->
                @for(pathInfo of datasetPaths(); track pathInfo.color) {
                    @for(point of pathInfo.points; track point.x) {
                        <circle [attr.cx]="point.x" [attr.cy]="point.y" r="3" [attr.fill]="pathInfo.color" class="opacity-0 hover:opacity-100 cursor-pointer transition-opacity" />
                    }
                }
            </svg>
        </div>
        
        <!-- Legend -->
        <div class="flex-shrink-0 flex justify-center items-center gap-4 pt-4">
            @for (dataset of datasets(); track dataset.label; let d = $index) {
                <div class="flex items-center gap-2 text-sm">
                    <div class="w-3 h-3 rounded-sm" [style.backgroundColor]="colors[d % colors.length]"></div>
                    <span class="text-charcoal-300">{{ dataset.label }}</span>
                </div>
            }
        </div>
    } @else {
        <div class="h-full flex flex-col items-center justify-center text-charcoal-500">
            <i class="fa-solid fa-chart-line text-4xl mb-4"></i>
            <p>No data to display for the line chart.</p>
        </div>
    }
</div>
