<div>
  @if(label()) {
    <label class="flex items-center gap-2 text-sm font-medium text-charcoal-300 mb-1">
      <i class="fa-solid fa-calendar-day w-4 text-center text-charcoal-400"></i>
      <span>{{ label() }}</span>
    </label>
  }
  <div class="relative">
    <button (click)="togglePicker($event)" type="button" class="aurora-input text-left mt-1 block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm transition-all duration-150 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-inset focus:outline-none min-h-[40px] flex items-center justify-between">
      <span [class.text-charcoal-400]="!startDate()">{{ displayValue() }}</span>
      <i class="fa-solid fa-calendar-days text-charcoal-400"></i>
    </button>
    
    @if(isOpen()) {
      <div (click)="$event.stopPropagation()" class="absolute top-full mt-2 w-80 z-20 bg-surface-raised/95 backdrop-blur-xl rounded-xl shadow-2xl overflow-hidden animate-[slide-down-fade_180ms_cubic-bezier(0.2,0.8,0.2,1)] border border-charcoal-700/30">
        <!-- Header -->
        <div class="flex items-center justify-between p-3">
          <button (click)="changeMonth(-1)" type="button" class="w-8 h-8 flex items-center justify-center text-charcoal-400 hover:bg-surface-inset rounded-full transition-colors">
            <i class="fa-solid fa-chevron-left text-sm"></i>
          </button>
          <span class="text-sm font-semibold">{{ monthDisplay() }}</span>
          <button (click)="changeMonth(1)" type="button" class="w-8 h-8 flex items-center justify-center text-charcoal-400 hover:bg-surface-inset rounded-full transition-colors">
            <i class="fa-solid fa-chevron-right text-sm"></i>
          </button>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-7 text-center text-xs p-2">
          @for(day of weekdays; track day) {
            <div class="font-semibold text-charcoal-500 pb-2">{{day}}</div>
          }
          @for(day of calendarGrid(); track day.dateString) {
            <div class="relative py-0.5" 
                [class.bg-primary/10]="isDayInRange(day)"
                [class.rounded-l-full]="isRangeStart(day) && endDate()"
                [class.rounded-r-full]="isRangeEnd(day)">
              <button (click)="selectDay(day)" type="button" 
                  class="w-8 h-8 flex items-center justify-center text-sm rounded-full transition-colors"
                  [disabled]="!day.isCurrentMonth"
                  [class.text-charcoal-600]="!day.isCurrentMonth"
                  [class.text-charcoal-100]="day.isCurrentMonth"
                  [class.hover:bg-surface-inset]="!isDaySelected(day)"
                  [class.bg-primary]="isDaySelected(day)"
                  [class.text-white]="isDaySelected(day)"
                  [class.ring-1]="day.isToday && !isDaySelected(day)"
                  [class.ring-primary]="day.isToday && !isDaySelected(day)">
                {{ day.dayOfMonth }}
              </button>
            </div>
          }
        </div>

        <!-- Footer -->
        <div class="p-2 flex items-center justify-between border-t border-charcoal-700/50">
           <button (click)="setToday()" type="button" class="text-sm font-semibold px-3 py-1.5 rounded-md hover:bg-surface-inset">Today</button>
           <button (click)="clear()" type="button" class="text-sm font-semibold px-3 py-1.5 rounded-md hover:bg-surface-inset">Clear</button>
        </div>
      </div>
    }
  </div>
</div>
<style>
@keyframes slide-down-fade {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-\[slide-down-fade_180ms_cubic-bezier\(0\.2\,0\.8\,0\.2\,1\)\] {
  animation: slide-down-fade 180ms cubic-bezier(0.2,0.8,0.2,1);
}
</style>
