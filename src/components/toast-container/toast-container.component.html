<div class="fixed top-20 right-4 z-[100] space-y-3">
  @for (toast of toasts(); track toast.id) {
    <div 
      class="w-full max-w-sm bg-surface/90 backdrop-blur-xl rounded-2xl shadow-2xl flex items-start p-4 border-l-4 toast-item"
      [class]="getBorderClass(toast.type)"
      role="alert">
      <div class="flex-shrink-0 text-xl" [class]="getTextClass(toast.type)">
        <i [class]="getIconClass(toast.type)"></i>
      </div>
      <div class="ml-3 flex-1">
        <p class="text-sm font-medium text-charcoal-100">{{ toast.message }}</p>
      </div>
      <button (click)="removeToast(toast.id)" class="ml-3 flex-shrink-0 text-charcoal-400 hover:text-white transition-colors">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
  }
</div>
