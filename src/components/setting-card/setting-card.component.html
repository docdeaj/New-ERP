
<div class="bg-surface rounded-2xl shadow-lg p-5 flex flex-col h-full">
  <div class="flex-1">
    <div class="flex justify-between items-start gap-4">
      <label [for]="setting().key" class="font-semibold text-brand-text cursor-pointer">{{ setting().label }}</label>
      
      <!-- UI Control Switcher -->
      @switch (setting().ui_control) {
        @case ('switch') {
          <div class="flex items-center">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" [formControl]="control" class="sr-only peer">
              <div class="w-11 h-6 bg-charcoal-700 rounded-full peer peer-focus:ring-2 peer-focus:ring-primary-500/50 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-charcoal-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-600"></div>
            </label>
          </div>
        }
      }
    </div>
    <p class="text-charcoal-400 text-sm mt-1 pr-12">{{ setting().description }}</p>

    <div class="mt-4">
       @switch (setting().ui_control) {
        @case ('text') {
          <input 
            type="text" 
            [id]="setting().key" 
            [formControl]="control"
            class="aurora-input block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm">
        }
        @case ('textarea') {
            <textarea
                [id]="setting().key"
                [formControl]="control"
                rows="3"
                class="aurora-input block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm"></textarea>
        }
        @case ('number') {
           <input 
            type="number" 
            [id]="setting().key" 
            [formControl]="control"
            [min]="setting().min"
            [max]="setting().max"
            class="aurora-input block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm">
        }
        @case ('select') {
          <select 
            [id]="setting().key" 
            [formControl]="control"
            class="aurora-input block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 px-3 sm:text-sm">
            @for(option of setting().options; track option) {
              <option [value]="option">{{ option }}</option>
            }
          </select>
        }
      }
    </div>
  </div>
  <div class="flex justify-end mt-4">
    <button (click)="resetToDefault()" class="text-xs font-semibold text-charcoal-400 hover:text-primary-400 transition-colors p-1">
      Reset to default
    </button>
  </div>
</div>
