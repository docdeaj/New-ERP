<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-charcoal-950/50 backdrop-blur-sm animate-[fade-in_180ms_ease-in-out]" (click)="onClose()"></div>

  <!-- Modal -->
  <div class="relative w-full max-w-md bg-white dark:bg-charcoal-800 rounded-2xl shadow-2xl animate-[slide-down_180ms_cubic-bezier(0.2,0.8,0.2,1)]" role="dialog" aria-modal="true">
    <!-- Header -->
    <div class="p-4 border-b border-gray-200 dark:border-charcoal-700 flex justify-between items-center">
      <h3 class="text-xl font-bold">Checkout</h3>
      <button (click)="onClose()" class="text-gray-400 hover:text-gray-800 dark:hover:text-charcoal-100 transition-colors p-2 rounded-full">
        <i class="fa-solid fa-times text-xl"></i>
      </button>
    </div>

    <!-- Customer Picker -->
    <div class="p-4 border-b border-gray-200 dark:border-charcoal-700">
      <app-customer-picker 
        [value]="selectedCustomer()"
        (onSelect)="selectedCustomer.set($event)"
        (onClear)="selectedCustomer.set(null)">
      </app-customer-picker>
      
      <!-- Balance Alert Chip -->
      @if (selectedCustomer()?.stats?.balance_lkr && selectedCustomer()!.stats!.balance_lkr! > 0) {
        <div class="mt-2 p-2 text-sm bg-red-100 dark:bg-red-900/50 text-red-800 dark:text-red-300 rounded-lg flex items-center gap-2 animate-[fade-in_200ms_ease-in-out]">
          <i class="fa-solid fa-circle-exclamation"></i>
          <span>This customer has an outstanding balance of <span class="font-bold">{{ selectedCustomer()?.stats?.balance_lkr | currency:'LKR '}}</span>.</span>
        </div>
      }
    </div>

    <!-- Reusable Payment Form Component -->
    <app-payment-form 
      [totalAmount]="total()"
      (paymentSuccess)="onPaymentSuccess($event)">
    </app-payment-form>

  </div>
</div>
<style>
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .animate-\[fade-in_200ms_ease-in-out\] { animation: fade-in 200ms ease-in-out; }
</style>
