<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold">Media Library</h2>
    <button class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out" disabled>
      <i class="fa-solid fa-upload"></i>
      <span>Bulk Upload</span>
    </button>
  </div>

  <div class="bg-surface rounded-2xl shadow-lg p-4">
    <!-- Filters placeholder -->
    <div class="flex items-center gap-4 mb-4">
      <div class="relative flex-1">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-charcoal-400"></i>
        <input type="text" placeholder="Search media..." class="aurora-input mt-1 block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-2 pl-10 pr-4 sm:text-sm transition-all duration-150 focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-inset focus:outline-none">
      </div>
      <!-- More filters can go here -->
    </div>

    <!-- Media Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-4">
      @if (isLoading()) {
        @for (_ of [1,2,3,4,5,6,7,8]; track $index) {
          <div class="aspect-square bg-surface-raised rounded-lg animate-pulse"></div>
        }
      } @else {
        @for (item of mediaItems(); track item.id) {
          <div class="group relative aspect-square rounded-lg overflow-hidden cursor-pointer shadow-md transition-all duration-200 hover:shadow-lg hover:-translate-y-1">
            <img [src]="item.url" [alt]="item.name" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <div class="absolute bottom-0 left-0 p-2 text-white">
                <p class="text-xs font-semibold truncate">{{ item.name }}</p>
                <p class="text-xs opacity-80">{{ formatBytes(item.size) }}</p>
              </div>
            </div>
          </div>
        }
      }
    </div>
  </div>
</div>
