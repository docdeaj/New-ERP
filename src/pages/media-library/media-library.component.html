<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold">Media Library</h2>
    <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors duration-200 flex items-center gap-2 disabled:opacity-50" disabled>
      <i class="fa-solid fa-upload"></i>
      <span>Bulk Upload</span>
    </button>
  </div>

  <div class="bg-white dark:bg-charcoal-800 rounded-2xl shadow-md p-4">
    <!-- Filters placeholder -->
    <div class="flex items-center gap-4 mb-4">
      <div class="relative flex-1">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
        <input type="text" placeholder="Search media..." class="w-full bg-gray-100 dark:bg-charcoal-700 border-transparent rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <!-- More filters can go here -->
    </div>

    <!-- Media Grid -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-8 gap-4">
      @if (isLoading()) {
        @for (_ of [1,2,3,4,5,6,7,8]; track $index) {
          <div class="aspect-square bg-gray-200 dark:bg-charcoal-700 rounded-lg animate-pulse"></div>
        }
      } @else {
        @for (item of mediaItems(); track item.id) {
          <div class="group relative aspect-square rounded-lg overflow-hidden cursor-pointer shadow-sm">
            <img [src]="item.url" [alt]="item.name" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-110">
            <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300">
              <div class="absolute bottom-0 left-0 p-2 text-white">
                <p class="text-xs font-semibold truncate">{{ item.name }}</p>
                <p class="text-xs opacity-80">{{ formatBytes(item.size) }}</p>
              </div>
            </div>
          </div>
        }
      }
    </div>
  </div>
</div>
