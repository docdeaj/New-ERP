<div class="flex flex-col gap-3 sm:gap-4">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold">All Receipts</h2>
    <button (click)="openAddNewReceiptDrawer()" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
      <i class="fa-solid fa-plus"></i>
      <span>Add New Receipt</span>
    </button>
  </div>
  
  <app-data-table 
    [columns]="columns" 
    [data]="receipts()"
    context="receipt"
    (rowAction)="handleRowAction($event)"
    (bulkAction)="handleBulkAction($event)">
  </app-data-table>
</div>
