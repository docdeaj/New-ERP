<div class="flex flex-col gap-3 sm:gap-4">
  <app-data-table 
    title="All Receipts"
    description="A record of all payments received from customers."
    [columns]="columns" 
    [data]="receipts()"
    context="receipt"
    (rowAction)="handleRowAction($event)"
    (bulkAction)="handleBulkAction($event)">
    <button table-tools (click)="openAddNewReceiptDrawer()" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
      <i class="fa-solid fa-plus"></i>
      <span>Add New Receipt</span>
    </button>
  </app-data-table>
</div>
