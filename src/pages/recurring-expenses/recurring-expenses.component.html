<div class="flex flex-col gap-3 sm:gap-4">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold">Recurring Expenses</h2>
    <button (click)="openAddNewExpenseDrawer()" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
      <i class="fa-solid fa-plus"></i>
      <span>Add New Expense</span>
    </button>
  </div>
  
  <app-data-table 
    [columns]="columns" 
    [data]="recurringExpenses()"
    context="recurring-expense"
    (rowAction)="handleRowAction($event)"
    (bulkAction)="handleBulkAction($event)">
  </app-data-table>
</div>
