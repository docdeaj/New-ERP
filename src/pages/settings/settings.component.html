
<div class="flex flex-col lg:flex-row gap-8">
  <!-- Left: Navigation Sidebar -->
  <aside class="lg:w-64 flex-shrink-0">
    <div class="sticky top-20">
      <div class="mb-4">
        <app-settings-search 
          [settings]="allSettings()"
          (jumpTo)="handleJumpToSetting($event)">
        </app-settings-search>
      </div>

      <h2 class="text-lg font-semibold mb-3 px-2">Settings</h2>
      <nav class="space-y-1">
        @for (link of navLinks(); track link.path) {
          <a 
            [routerLink]="link.path"
            routerLinkActive="active"
            class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg transition-colors border-l-2 settings-nav-item">
            <i [class]="link.icon + ' w-5 text-center'"></i>
            <span>{{ link.label }}</span>
          </a>
        }
      </nav>
    </div>
  </aside>

  <!-- Right: Content -->
  <main class="flex-1 min-w-0">
    <router-outlet></router-outlet>
  </main>
</div>

<style>
.settings-nav-item {
  @apply text-charcoal-300 border-transparent hover:bg-surface-raised;
}
.settings-nav-item.active {
  @apply bg-primary/10 text-primary-200 border-primary;
}
.setting-highlight {
  transition: all 300ms ease-in-out;
  box-shadow: 0 0 0 3px rgb(var(--color-primary-500) / 0.6), var(--shadow-lg);
  transform: scale(1.01);
}
</style>
