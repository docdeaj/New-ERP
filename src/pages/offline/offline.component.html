<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md text-center">
    <div class="bg-surface/80 backdrop-blur-xl rounded-2xl shadow-2xl p-8">
      <div class="text-amber-500 text-7xl mb-6">
        <i class="fa-solid fa-wifi-slash"></i>
      </div>
      <h1 class="text-4xl font-bold text-brand-text mb-2">You're Offline</h1>
      <h2 class="text-xl font-semibold text-brand-text mb-4">No Internet Connection</h2>
      <p class="text-charcoal-400 mb-8">
        Please check your network connection and try again. Some features may be unavailable until you're back online.
      </p>
      <button (click)="retryConnection()" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-6 py-3 rounded-xl">
        <i class="fa-solid fa-redo"></i>
        <span>Retry Connection</span>
      </button>
    </div>
  </div>
</div>
