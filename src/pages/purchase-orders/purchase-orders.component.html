<div class="flex flex-col gap-3 sm:gap-4">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold">All Purchase Orders</h2>
    <button (click)="openAddNewDrawer()" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
      <i class="fa-solid fa-plus"></i>
      <span>New Purchase Order</span>
    </button>
  </div>
  
  <app-data-table 
    [columns]="columns" 
    [data]="purchaseOrders()"
    context="purchase-order"
    (rowAction)="handleRowAction($event)"
    (bulkAction)="handleBulkAction($event)">
  </app-data-table>
</div>

@if (isConversionModalOpen() && selectedPoForConversion(); as po) {
  <app-po-to-stock-modal
    [purchaseOrder]="po"
    (close)="closeConversionModal()"
    (confirm)="handleConfirmConversion($event)">
  </app-po-to-stock-modal>
}
