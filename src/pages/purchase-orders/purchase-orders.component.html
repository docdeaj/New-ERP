<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold">All Purchase Orders</h2>
    <button (click)="openAddNewDrawer()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors duration-200 flex items-center gap-2">
      <i class="fa-solid fa-plus"></i>
      <span>New Purchase Order</span>
    </button>
  </div>
  
  <app-data-table 
    [columns]="columns" 
    [data]="purchaseOrders()"
    context="purchase-order"
    (rowAction)="handleRowAction($event)"
    (bulkAction)="handleBulkAction($event)">
  </app-data-table>
</div>

@if (isConversionModalOpen() && selectedPoForConversion(); as po) {
  <app-po-to-stock-modal
    [purchaseOrder]="po"
    (close)="closeConversionModal()"
    (confirm)="handleConfirmConversion($event)">
  </app-po-to-stock-modal>
}
