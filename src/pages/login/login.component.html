<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="bg-surface/80 backdrop-blur-xl rounded-2xl shadow-2xl p-8 text-center">
      <div class="flex items-center justify-center gap-4 mb-6">
        <div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/30">
          <i class="fa-solid fa-feather-pointed text-2xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-brand-text">Aurora ERP+POS</h1>
      </div>
      
      <p class="text-charcoal-400 mb-8">
        Welcome back. Please log in to continue.
      </p>

      <form (submit)="login()">
        <div class="space-y-4">
          <div>
            <input type="email" placeholder="Email (mock)" class="aurora-input block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-3 px-4 text-center">
          </div>
          <div>
            <input type="password" placeholder="Password (mock)" class="aurora-input block w-full bg-surface-inset text-brand-text border-transparent rounded-lg py-3 px-4 text-center">
          </div>
        </div>

        <div class="mt-8">
          <button type="submit" class="aurora-button-primary w-full inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-3 rounded-xl">
            Sign In
          </button>
        </div>
      </form>
      
      <p class="text-sm text-charcoal-400 mt-6">
        Don't have an account? 
        <a routerLink="/signup" class="font-semibold text-primary hover:underline">Sign up</a>
      </p>
    </div>
  </div>
</div>
