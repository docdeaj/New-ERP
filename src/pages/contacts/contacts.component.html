<div class="flex flex-col gap-3 sm:gap-4">
  <app-data-table 
    title="All Contacts"
    description="Manage your customers and suppliers."
    [columns]="columns" 
    [data]="contacts()"
    context="contact"
    (rowAction)="handleRowAction($event)"
    (bulkAction)="handleBulkAction($event)">
    <button table-tools (click)="openAddNewDrawer()" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
      <i class="fa-solid fa-plus"></i>
      <span>Add New Contact</span>
    </button>
  </app-data-table>
</div>
