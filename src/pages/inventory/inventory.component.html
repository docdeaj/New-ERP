<div class="flex flex-col gap-3 sm:gap-4">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold">Inventory Status</h2>
    <button (click)="openAddNewProductDrawer()" class="aurora-button-primary inline-flex items-center justify-center gap-2 font-bold text-white px-4 py-2 rounded-xl transition-all duration-150 ease-in-out">
      <i class="fa-solid fa-plus"></i>
      <span>Add New Product</span>
    </button>
  </div>
  
  <app-data-table 
    [columns]="columns" 
    [data]="inventory()"
    [initialSearchQuery]="initialQuery()"
    context="inventory"
    (rowAction)="handleRowAction($event)"
    (bulkAction)="handleBulkAction($event)">
  </app-data-table>
</div>

@if (isTransferModalOpen()) {
  <app-stock-transfer-modal 
    [selectedItemIds]="selectedIdsForTransfer()"
    (close)="closeTransferModal()"
    (confirmTransfer)="handleConfirmTransfer($event)">
  </app-stock-transfer-modal>
}
