<div class="relative min-h-screen">
  <app-sidebar 
    [isCollapsed]="isSidebarCollapsed()" 
    (toggleCollapse)="toggleSidebar()">
  </app-sidebar>

  <main [class]="'p-4 sm:p-6 transition-all duration-300 ease-in-out ' + mainContentMargin()">
    <app-topbar (openSearch)="isSearchOpen.set(true)"></app-topbar>
    <div class="mt-6">
      <router-outlet></router-outlet>
    </div>
  </main>
  
  @if (isSearchOpen()) {
    <app-universal-search (close)="closeSearch()"></app-universal-search>
  }

  @if (isDrawerOpen()) {
    <app-universal-add-drawer 
      [context]="drawerContext()"
      (close)="closeDrawer()">
    </app-universal-add-drawer>
  }

  @if (confirmationState(); as state) {
    <app-confirmation-modal
      [title]="state.title"
      [message]="state.message"
      (confirm)="onConfirm()"
      (cancel)="onCancel()">
    </app-confirmation-modal>
  }
</div>
